name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prepare demo (strip API routes, swap dynamic flags)
        run: bash scripts/prepare-demo.sh

      - name: Build (static export)
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXTAUTH_SECRET: "demo-secret-not-used"
          NEXTAUTH_URL: "https://ibeezhan.github.io/sulceramic-booking"
          GOOGLE_CLIENT_ID: "demo"
          GOOGLE_CLIENT_SECRET: "demo"
          OWNER_EMAIL: "miguel@sulceramic.com"
          DATABASE_URL: "file:./dev.db"
        run: |
          npx prisma generate || true
          npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
